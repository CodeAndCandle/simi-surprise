<!DOCTYPE html>
<html>
<head>

<title>Secret Message</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:50px;
}

.container{
max-width:400px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:20px;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:80%;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border-radius:20px;
border:none;
background:#ff6b9d;
color:white;
cursor:pointer;
font-size:16px;
}

#hiddenMessage{
display:none;
margin-top:20px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<h2>🔒 A Hidden Message</h2>

<p>Only one word unlocks this message...</p>

<input type="password" id="password" placeholder="Enter the word">

<br>

<button onclick="checkPassword()">Unlock</button>

<p id="error"></p>

<div id="hiddenMessage">

<p>
Hey Simi ❤️
<br><br>
If you're reading this, you found the little secret I left here.
<br><br>
I made this page so you'd always have a small reminder that I'm thinking about you.
<br><br>
Maybe this trip will give us our next favorite memory.
<br><br>
— Samir
</p>

</div>

</div>

<script>

function checkPassword(){

let input = document.getElementById("password").value;

if(input.toLowerCase() === "iloveyou"){

document.getElementById("hiddenMessage").style.display="block";
document.getElementById("error").innerText="";

}else{

document.getElementById("error").innerText="That's not the secret word ❤️";

}

}

</script>

</body>
</html>
